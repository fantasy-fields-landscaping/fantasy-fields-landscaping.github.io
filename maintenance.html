<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Property Maintenance | Fantasy Fields Landscaping</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #1b2f1e; 
            --accent: #8b3a2d; 
            --bg-light: #f4f1ec; 
            --gold: #c5a059; 
            --text: #2c3e2f; 
            --white: #ffffff; 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-light); 
            color: var(--text); 
            padding-top: 70px; 
            overflow-x: hidden;
        }

        /* --- STANDARDIZED HEADER --- */
        header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: var(--primary); z-index: 1001; 
            display: flex; align-items: center; justify-content: center; padding: 0 5%; 
        }
        .header-container { 
            width: 100%; max-width: 1400px; 
            display: flex; align-items: center; justify-content: space-between; 
        }
        .logo-group { display: flex; align-items: center; text-decoration: none; color: #fff; }
        .logo-img { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #fff; margin-right: 12px; }
        .brand-text { display: flex; flex-direction: column; line-height: 1.1; }
        .brand-main { font-weight: 700; font-size: 1.2rem; letter-spacing: 0.5px; }
        .brand-sub { font-weight: 400; font-size: 0.7rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 2px; }

        nav { display: flex; align-items: center; gap: 20px; }
        nav a { 
            color: white; text-decoration: none; font-weight: 600; font-size: 0.85rem; 
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        nav a:hover { color: var(--gold); }

        /* --- MAIN LAYOUT --- */
        .main-wrapper { display: flex; height: calc(100vh - 70px); width: 100vw; }

        .sidebar { 
            width: 65%; background: var(--primary); height: 100%;
            position: relative; overflow: hidden;
        }

        .image-container { display: flex; width: 100%; height: 72vh; background: #000; }
        .image-container img {
            height: 100%; width: 0; object-fit: cover;
            transition: width 0.8s cubic-bezier(0.65, 0, 0.35, 1), opacity 0.5s;
            opacity: 0; flex-shrink: 0;
        }
        .image-container img.base { width: 100%; opacity: 0.9; }
        .image-container img.active { opacity: 1; border-left: 2px solid rgba(255,255,255,0.2); }

        .sidebar-content { 
            padding: 40px 60px; 
            background: linear-gradient(to top, var(--primary) 85%, transparent);
            position: absolute; bottom: 0; width: 100%; z-index: 5;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .title-block { flex: 1; }

        .tier-indicator { font-family: 'Playfair Display'; font-size: 0.8rem; color: var(--gold); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 5px; }
        .sidebar-content h1 { font-family: 'Playfair Display'; font-size: 3.2rem; color: white; margin-bottom: 15px; }
        
        .package-details { list-style: none; display: flex; gap: 20px; flex-wrap: wrap; }
        .package-details li { font-size: 0.85rem; color: rgba(255,255,255,0.9); display: flex; align-items: center; gap: 8px; }
        .package-details li::before { content: '✓'; color: var(--gold); font-weight: bold; }

        .content-area { 
            width: 35%; 
            padding: 40px 4% 20px 4%; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            background: var(--white);
        }

        .addon-sub-header {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.6;
            margin-bottom: 15px;
        }

        .addon-card { 
            background: var(--white); padding: 15px; margin-bottom: 10px; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center; 
            transition: 0.2s; border: 1px solid rgba(0,0,0,0.08); border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .addon-card:hover { border-color: var(--gold); background: #fafafa; }
        .addon-card.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .addon-card h4 { font-family: 'Playfair Display'; font-size: 1rem; }
        .addon-card p { font-size: 0.75rem !important; opacity: 0.8; }
        .status-badge { font-weight: 700; font-size: 0.6rem; padding: 3px 8px; border: 1px solid var(--gold); color: var(--gold); border-radius: 4px; }
        .active .status-badge { border-color: white; color: white; }

        .btn-finalize { 
            background: var(--accent); 
            color: white; 
            padding: 15px 30px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            border: none; 
            cursor: pointer; 
            border-radius: 6px;
            transition: 0.3s; 
            font-size: 0.8rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 15px;
            white-space: nowrap;
        }
        .btn-finalize:hover { 
            background: #a64b3c; 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(0,0,0,0.4); 
        }

        /* --- MOBILE/TABLET ADJUSTMENTS --- */
        @media (max-width: 1100px) {
            .main-wrapper { flex-direction: column; height: auto; }
            .sidebar, .content-area { width: 100%; }
            
            /* 1. Shrunk picture height */
            .image-container { height: 25vh; } 
            
            /* 2. Extended green background to include content */
            .sidebar-content { 
                position: relative; 
                background: var(--primary); 
                padding: 20px 5%; 
                flex-direction: column; 
                align-items: flex-start;
                justify-content: flex-start;
            }
            
            .sidebar-content h1 { font-size: 1.8rem; margin-bottom: 10px; }
            .package-details { margin-bottom: 15px; }

            /* 3. Shrunk button size on mobile */
            .btn-finalize { 
                width: 100%; 
                margin-top: 5px; 
                padding: 12px; 
                font-size: 0.75rem; 
                margin-bottom: 0;
            }

            /* 4. Bringing Add-ons up */
            .content-area { 
                padding: 20px 5%; 
                background: var(--white); /* Keeps the section distinct but pulls it up */
            }
            .addon-sub-header { margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="index.html" class="logo-group">
                <img src="logo.png" alt="Logo" class="logo-img">
                <div class="brand-text">
                    <span class="brand-main">Fantasy Fields</span>
                    <span class="brand-sub">Landscaping</span>
                </div>
            </a>
            <nav>
                <a href="index.html">Home</a>
                <a href="landscaping.html">Projects</a>
            </nav>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="sidebar">
            <div class="image-container" id="image-box">
                <img src="Updated%20Lawn%20Care%202.jpg" class="base" id="img-base">
                <img src="Garden%20Bed%20Maintenace.jpg" id="img-garden">
                <img src="Bush%20trimming%202.jpg" id="img-bush">
            </div>
            <div class="sidebar-content">
                <div class="title-block">
                    <div class="tier-indicator" id="tier-label">Base Plan</div>
                    <h1 id="tier-title">Lawn Maintenance</h1>
                    <ul class="package-details" id="details-list">
                        <li>Scheduled mowing and edging</li>
                    </ul>
                </div>
                <button class="btn-finalize" onclick="sendToContact()">Request Service Quote</button>
            </div>
        </div>

        <div class="content-area">
            <p class="addon-sub-header">Select your add-ons:</p>

            <div class="addon-card" onclick="toggleOption(this, 'garden')">
                <div>
                    <h4>Garden Bed Care</h4>
                    <p>Routine weeding of gardens</p>
                </div>
                <div class="status-badge" id="badge-garden">ADD</div>
            </div>

            <div class="addon-card" onclick="toggleOption(this, 'bush')">
                <div>
                    <h4>Shrub Maintenance</h4>
                    <p>Hedge trimming and ornamental shaping.</p>
                </div>
                <div class="status-badge" id="badge-bush">ADD</div>
            </div>
        </div>
    </div>

    <script>
        let selections = { garden: false, bush: false };

        function toggleOption(element, type) {
            selections[type] = !selections[type];
            element.classList.toggle('active');
            document.getElementById(`badge-${type}`).innerText = selections[type] ? "ADDED" : "ADD";
            updateLayout();
        }

        function updateLayout() {
            const baseImg = document.getElementById('img-base');
            const gardenImg = document.getElementById('img-garden');
            const bushImg = document.getElementById('img-bush');
            
            let activeCount = 1;
            if (selections.garden) activeCount++;
            if (selections.bush) activeCount++;

            const shareWidth = (100 / activeCount) + "%";
            baseImg.style.width = shareWidth;
            
            if(selections.garden) {
                gardenImg.classList.add('active');
                gardenImg.style.width = shareWidth;
            } else {
                gardenImg.classList.remove('active');
                gardenImg.style.width = "0";
            }

            if(selections.bush) {
                bushImg.classList.add('active');
                bushImg.style.width = shareWidth;
            } else {
                bushImg.classList.remove('active');
                bushImg.style.width = "0";
            }

            const list = document.getElementById('details-list');
            const tierLabel = document.getElementById('tier-label');
            const tierTitle = document.getElementById('tier-title');
            
            list.innerHTML = `<li>Scheduled mowing and edging</li>`;
            if (selections.garden) list.innerHTML += `<li>Garden Bed Care</li>`;
            if (selections.bush) list.innerHTML += `<li>Shrub Maintenance</li>`;

            if (activeCount === 1) { tierLabel.innerText = "Base Plan"; tierTitle.innerText = "Lawn Maintenance"; }
            else if (activeCount === 2) { tierLabel.innerText = "Tier 2"; tierTitle.innerText = "Enhanced Care"; }
            else if (activeCount === 3) { tierLabel.innerText = "Tier 3"; tierTitle.innerText = "The Full Estate"; }
        }

        function sendToContact() {
            let services = "Lawn Mowing and Edging";
            if (selections.garden) services += ", Garden Bed Care";
            if (selections.bush) services += ", Shrub Maintenance";
            const tier = document.getElementById('tier-title').innerText;
            window.location.href = `index.html?package=${encodeURIComponent(tier)}&services=${encodeURIComponent(services)}#contact`;
        }
    </script>
</body>
</html>
